name: EarthPrint CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Prettier Code Format Check
      run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,css,md}"

    - name: Run Lint
      run: npm run lint

    - name: Run Tests
      run: npm run test

    - name: Run Build
      run: npm run build
