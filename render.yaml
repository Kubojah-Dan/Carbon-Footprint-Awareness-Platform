services:
  - type: web
    name: earthprint-web
    env: node
    plan: free
    buildCommand: npm install --include=dev && npx turbo run build --filter=@earthprint/web...
    startCommand: npm run start --workspace=@earthprint/web
    envVars:
      - key: NODE_VERSION
        value: "20.20.2"
      - key: NODE_ENV
        value: "production"
      
      # Firebase Client Settings
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_VAPID_KEY
        sync: false

      # Firebase Admin Settings
      - key: FIREBASE_ADMIN_PROJECT_ID
        sync: false
      - key: FIREBASE_ADMIN_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_ADMIN_PRIVATE_KEY
        sync: false

      # Services & APIs
      - key: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ELECTRICITY_MAPS_API_KEY
        sync: false
      - key: API_KEY_SECRET
        sync: false
